name: Integration Tests
on: pull_request

jobs:
  integration:
    runs-on: ubuntu-latest
    container:
      image: golang:1.24

    steps:
      - uses: actions/checkout@v6

      - name: Install BATS
        run: |
          apt-get update
          apt-get install -y bats

      - name: Build forte
        run: make build

      - name: Run integration tests
        run: bats -r ./integration_tests
