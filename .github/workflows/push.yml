name: Quality Checks
on:
  push:
    paths:
      - "**/*.go"
      - "go.mod"
      - ".github/workflows/push.yml"
      - ".golangci.yml"
      - "Makefile"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
      - uses: golangci/golangci-lint-action@v9

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Build
        run: make build

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Unit Tests with Coverage
        run: make test-coverage
      - name: Send coverage
        uses: shogo82148/actions-goveralls@v1
        with:
          path-to-profile: profile.cov
  examples:
    name: Example Deployments
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Java App Deployment
        run: make -s example-java-deployment

      - name: PHP App Deployment
        run: make -s example-php-deployment

      - name: Python App Deployment
        run: make -s example-python-deployment

      - name: NodeJS App Deployment
        run: make -s example-nodejs-deployment

      - name: Ruby (Rake) App Deployment
        run: make -s example-ruby-deployment
