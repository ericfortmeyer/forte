name: Release
on:
  release:
    types:
      - published

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
        run: |
          go build -o forte-linux-${{ matrix.arch }} ./cmd/forte

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3
        with:
          files: forte-linux-*
